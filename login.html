<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="icon" href="logo.png">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.1.1/jquery.min.js"></script>

<body>
    <div class="container" style="margin-top:20px;">
        <div class="col-xs-3"></div>
        <div class="col-xs-6" style="margin-top:20px;background-color:rgb(47, 129, 0);padding:20px;">
            <form class="form-horizontal" action="logindetails.php" method="post">
                <div class="form-group">
                    <label class="control-label col-sm-2" for="name">Name:</label>
                    <div class="col-sm-10">          
                      <input type="text" class="form-control" id="name" placeholder="Enter Name" name="name">
                    </div>
                  </div>
                <div class="form-group">
                  <label class="control-label col-sm-2" for="email">Email:</label>
                  <div class="col-sm-10">
                    <input type="email" class="form-control" id="email" placeholder="Enter email" name="email">
                  </div>
                </div>
                <div class="form-group">
                    <label class="control-label col-sm-2" for="number">Number:</label>
                    <div class="col-sm-10">
                      <input type="number" class="form-control" id="number" placeholder="Enter Mobile Number" name="number">
                    </div>
                  </div>
                <div class="form-group">        
                  <div class="col-sm-offset-2 col-sm-10">
                    <button type="submit" class="btn btn-default" name="save">Submit</button>
                  </div>
                </div>
              </form>
        </div>
        <div class="col-xs-3"></div>
    </div>
